<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebPing — Multi-Host Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #080b0f;
      --surface:      #0e1218;
      --surface2:     #131820;
      --border:       #1c2530;
      --border2:      #253040;
      --text:         #b8ccdc;
      --text-muted:   #4a6070;
      --text-dim:     #2a3a48;
      --accent:       #00d4f5;
      --accent-glow:  rgba(0,212,245,0.12);
      --green:        #2ef08a;
      --green-dim:    #0d4028;
      --yellow:       #f0c040;
      --red:          #f04858;
      --red-dim:      #4a1020;
      --mono:         'Space Mono', monospace;
      --sans:         'Syne', sans-serif;
      --panel-min:    280px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
      pointer-events: none; z-index: 9999;
    }

    #app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-pulse {
      width: 28px; height: 28px; border: 1.5px solid var(--accent); border-radius: 5px;
      position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    .logo-pulse::before {
      content: ''; position: absolute; border-radius: 50%; background: var(--accent);
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse { 0%{width:3px;height:3px;opacity:0.9} 100%{width:24px;height:24px;opacity:0} }

    .logo-name { font-family: var(--sans); font-weight: 800; font-size: 17px; letter-spacing: -0.3px; color: #fff; }
    .logo-name em { color: var(--accent); font-style: normal; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .ws-badge { display: flex; align-items: center; gap: 6px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
    .ws-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: all 0.3s; }
    .ws-dot.ok   { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .ws-dot.busy { background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: blink 0.7s infinite; }
    .ws-dot.err  { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

    .btn-hdr {
      padding: 5px 11px; border-radius: 4px; border: 1px solid var(--border2);
      background: transparent; color: var(--text-muted); font-family: var(--mono); font-size: 11px;
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; white-space: nowrap;
    }
    .btn-hdr:hover { border-color: var(--accent); color: var(--accent); }

    .btn-add {
      padding: 5px 14px; border-radius: 4px; border: none;
      background: var(--accent); color: #000; font-family: var(--mono); font-size: 11px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-add:hover { background: #33dcff; }

    /* Grid */
    #grid-wrap { position: relative; overflow: hidden; min-height: 0; }
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(var(--panel-min), 1fr));
      gap: 1px;
      background: var(--border);
      height: 100%;
    }

    /* Panel */
    .panel {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      background: var(--bg);
      min-height: 0; overflow: hidden;
      animation: panelIn 0.22s ease;
    }
    @keyframes panelIn { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:none} }

    .panel-head {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .panel-dots { display: flex; gap: 5px; }
    .pdot { width: 9px; height: 9px; border-radius: 50%; cursor: pointer; transition: opacity 0.2s; }
    .pdot:hover { opacity: 0.7; }
    .pdot.close { background: #ff5f57; }
    .pdot.stop  { background: #ffbd2e; }
    .pdot.ping  { background: #28ca41; }
    .panel-title { font-size: 11px; color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .panel-title.live { color: var(--accent); }
    .panel-status { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
    .panel-status.idle    { color: var(--text-dim); }
    .panel-status.pinging { color: var(--accent); background: var(--accent-glow); }
    .panel-status.done    { color: var(--green); background: var(--green-dim); }
    .panel-status.error   { color: var(--red); background: var(--red-dim); }

    .panel-ctrl {
      display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
      padding: 7px 10px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .panel-ctrl input {
      background: var(--bg); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--mono); font-size: 11px;
      padding: 5px 7px; border-radius: 3px; outline: none; transition: border-color 0.2s;
    }
    .panel-ctrl input:focus { border-color: var(--accent); }
    .inp-host { flex: 1; min-width: 80px; }
    .inp-num  { width: 48px; }
    .btn-go {
      padding: 5px 10px; border-radius: 3px; border: none;
      background: var(--accent); color: #000; font-family: var(--mono); font-size: 11px; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-go:hover { background: #33dcff; }
    .btn-go:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }
    .btn-kill {
      padding: 5px 8px; border-radius: 3px;
      border: 1px solid var(--red-dim); background: transparent;
      color: var(--red); font-family: var(--mono); font-size: 11px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-kill:hover { background: var(--red-dim); }
    .btn-kill:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Stat strip */
    .stat-strip { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .stat-item { flex: 1; padding: 4px 8px; border-right: 1px solid var(--border); }
    .stat-item:last-child { border-right: none; }
    .stat-lbl { font-size: 8px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }
    .stat-val { font-size: 11px; font-weight: 700; color: var(--text-muted); transition: color 0.3s; }
    .stat-val.g { color: var(--green); }
    .stat-val.y { color: var(--yellow); }
    .stat-val.r { color: var(--red); }

    /* Terminal */
    .term { overflow-y: auto; padding: 8px 10px; font-size: 11.5px; line-height: 1.65; min-height: 0; }
    .term::-webkit-scrollbar { width: 4px; }
    .term::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .tl { display: flex; gap: 6px; align-items: baseline; animation: fadeUp 0.12s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
    .tp { color: var(--text-dim); font-size: 10px; flex-shrink: 0; user-select: none; }
    .tt { word-break: break-all; flex: 1; }
    .tt.ok   { color: var(--green); }
    .tt.err  { color: var(--red); }
    .tt.info { color: var(--accent); }
    .tt.mute { color: var(--text-muted); }
    .tt.sum  { color: var(--yellow); }
    .tt.stop { color: var(--yellow); }
    .tms { font-size: 10px; flex-shrink: 0; min-width: 52px; text-align: right; }
    .tms.f { color: var(--green); }
    .tms.m { color: var(--yellow); }
    .tms.s { color: var(--red); }
    .tms.x { color: var(--text-dim); }

    .t-cursor { display: inline-block; width: 7px; height: 12px; background: var(--accent); vertical-align: middle; animation: cb 1s step-end infinite; }
    @keyframes cb { 0%,100%{opacity:1}50%{opacity:0} }
    .t-placeholder { color: var(--text-dim); font-size: 11px; padding: 8px 0; display: flex; align-items: center; gap: 6px; }

    /* Empty */
    #empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      pointer-events: none;
    }
    #empty.hidden { display: none; }
    .empty-ring {
      width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--border2);
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .empty-ring::after {
      content: ''; position: absolute; border-radius: 50%; border: 1.5px solid var(--accent);
      animation: ring 2s ease-out infinite;
    }
    @keyframes ring { 0%{width:0;height:0;opacity:0.6} 100%{width:60px;height:60px;opacity:0} }
    .empty-txt { font-family: var(--sans); font-size: 14px; color: var(--text-muted); }
    .empty-sub { font-size: 11px; color: var(--text-dim); }

    @media (max-width: 540px) {
      :root { --panel-min: 100%; }
      #grid { grid-template-columns: 1fr; }
      .header-right .btn-hdr { display: none; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-pulse"></div>
      <div class="logo-name">Web<em>Ping</em></div>
    </div>
    <div class="header-right">
      <div class="ws-badge"><div class="ws-dot" id="wsDot"></div><span id="wsLabel">connecting</span></div>
      <button class="btn-hdr" id="btnPingAll">▶ ALL</button>
      <button class="btn-hdr" id="btnStopAll">■ STOP ALL</button>
      <button class="btn-hdr" id="btnClearAll">⌫ CLEAR</button>
      <button class="btn-add" id="btnAdd">+ ADD HOST</button>
    </div>
  </header>

  <div id="grid-wrap">
    <div id="grid"></div>
    <div id="empty">
      <div class="empty-ring"></div>
      <div class="empty-txt">No hosts added</div>
      <div class="empty-sub">Click <strong style="color:var(--accent)">+ ADD HOST</strong> to begin</div>
    </div>
  </div>
</div>

<script>
// ── WebSocket ──────────────────────────────────────────────
let ws, wsOk = false;
const wsDot   = document.getElementById('wsDot');
const wsLabel = document.getElementById('wsLabel');

function wsConnect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen    = () => { wsOk = true;  wsDot.className='ws-dot ok';  wsLabel.textContent='connected'; };
  ws.onclose   = () => { wsOk = false; wsDot.className='ws-dot err'; wsLabel.textContent='disconnected'; setTimeout(wsConnect, 3000); };
  ws.onerror   = () => { wsDot.className='ws-dot err'; };
  ws.onmessage = (e) => { dispatch(JSON.parse(e.data)); };
}
wsConnect();

function wsSend(obj) {
  if (wsOk && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

// ── Panel registry ─────────────────────────────────────────
let seq = 0;
const panels = new Map();

// ── Dispatch ───────────────────────────────────────────────
function dispatch(msg) {
  const p = panels.get(msg.panelId);
  if (!p) return;
  switch(msg.type) {
    case 'start':   onStart(p,msg);   break;
    case 'line':    onLine(p,msg);    break;
    case 'error':   onErr(p,msg);     break;
    case 'done':    onDone(p,msg);    break;
    case 'stopped': onStopped(p,msg); break;
  }
}

// ── Create panel ───────────────────────────────────────────
function createPanel(defaultHost='') {
  const id = ++seq;
  const el = document.createElement('div');
  el.className = 'panel';
  el.innerHTML = `
    <div class="panel-head">
      <div class="panel-dots">
        <div class="pdot close" data-act="close" title="Remove"></div>
        <div class="pdot stop"  data-act="stop"  title="Stop"></div>
        <div class="pdot ping"  data-act="ping"  title="Ping"></div>
      </div>
      <div class="panel-title" data-title>panel-${id}</div>
      <div class="panel-status idle" data-status>IDLE</div>
    </div>
    <div class="panel-ctrl">
      <input class="inp-host" type="text" placeholder="hostname or IP" value="${escH(defaultHost)}" spellcheck="false" autocomplete="off" data-host />
      <input class="inp-num" type="number" value="10" min="1" max="200" title="Count" data-count />
      <input class="inp-num" type="number" value="1" min="0.2" max="60" step="0.2" title="Interval(s)" data-interval />
      <button class="btn-go"  data-bgo>▶</button>
      <button class="btn-kill" data-bstop disabled>■</button>
    </div>
    <div class="stat-strip">
      <div class="stat-item"><div class="stat-lbl">SENT</div><div class="stat-val" data-ss>—</div></div>
      <div class="stat-item"><div class="stat-lbl">RECV</div><div class="stat-val" data-sr>—</div></div>
      <div class="stat-item"><div class="stat-lbl">LOSS</div><div class="stat-val" data-sl>—</div></div>
      <div class="stat-item"><div class="stat-lbl">AVG</div> <div class="stat-val" data-sa>—</div></div>
      <div class="stat-item"><div class="stat-lbl">MAX</div> <div class="stat-val" data-sm>—</div></div>
    </div>
    <div class="term" data-term>
      <div class="t-placeholder"><span class="t-cursor"></span><span style="margin-left:6px">Enter a host above and press ▶</span></div>
    </div>`;

  const q = (s) => el.querySelector(s);
  const els = {
    title: q('[data-title]'), status: q('[data-status]'),
    host:  q('[data-host]'),  count:  q('[data-count]'), interval: q('[data-interval]'),
    bgo:   q('[data-bgo]'),   bstop:  q('[data-bstop]'),
    term:  q('[data-term]'),
    ss: q('[data-ss]'), sr: q('[data-sr]'), sl: q('[data-sl]'), sa: q('[data-sa]'), sm: q('[data-sm]'),
  };
  const state = { id, pinging:false, sent:0, recv:0, rtts:[] };
  panels.set(id, { state, els, el });

  els.bgo.addEventListener('click', () => startPing(id));
  els.bstop.addEventListener('click', () => stopPing(id));
  els.host.addEventListener('keydown', e => { if(e.key==='Enter') startPing(id); });
  q('[data-act="close"]').addEventListener('click', () => removePanel(id));
  q('[data-act="stop"]').addEventListener('click',  () => stopPing(id));
  q('[data-act="ping"]').addEventListener('click',  () => startPing(id));

  document.getElementById('grid').appendChild(el);
  document.getElementById('empty').classList.add('hidden');
  els.host.focus();

  if (defaultHost) setTimeout(() => startPing(id), 200);
  return id;
}

function removePanel(id) {
  stopPing(id);
  const p = panels.get(id);
  if (p) { p.el.remove(); panels.delete(id); }
  if (panels.size === 0) document.getElementById('empty').classList.remove('hidden');
}

// ── Ping ───────────────────────────────────────────────────
function startPing(id) {
  const p = panels.get(id);
  if (!p) return;
  const target = p.els.host.value.trim();
  if (!target) { p.els.host.focus(); return; }
  p.state.sent=0; p.state.recv=0; p.state.rtts=[];
  resetStats(p); clearTerm(p);
  wsSend({ action:'ping', panelId:id, target,
    count:    parseInt(p.els.count.value)||10,
    interval: parseFloat(p.els.interval.value)||1 });
}

function stopPing(id) {
  wsSend({ action:'stop', panelId:id });
}

// ── Handlers ───────────────────────────────────────────────
function onStart(p, msg) {
  setPinging(p, true);
  tLine(p, `PING ${msg.target} — ${msg.count} packets  [${new Date(msg.timestamp).toLocaleTimeString()}]`, 'info');
}

function onLine(p, msg) {
  const raw = msg.data.trim();
  if (!raw) return;

  if (/packets transmitted/i.test(raw)||/packet loss/i.test(raw)) { tLine(p,raw,'sum'); parseStatLn(p,raw); return; }
  if (/rtt|round.trip|min\/avg\/max/i.test(raw))                   { tLine(p,raw,'sum'); parseRttLn(p,raw);  return; }
  if (/request timeout/i.test(raw)||/no route/i.test(raw))         { p.state.sent++; liveStats(p); tLine(p,raw,'err'); return; }
  if (/^PING /i.test(raw)) return;

  if (/bytes from|icmp_seq|time=/i.test(raw)) {
    const ms = xMs(raw);
    p.state.sent++;
    if (ms!==null){ p.state.recv++; p.state.rtts.push(ms); }
    liveStats(p);
    tLineMs(p, raw, ms===null?'err':'ok', ms);
    return;
  }
  tLine(p, raw, 'mute');
}

function onErr(p, msg) { tLine(p,'ERROR: '+msg.message,'err'); setPinging(p,false); setStatus(p,'error','ERROR'); }
function onDone(p, msg) {
  tLine(p,`─── complete (exit ${msg.code}) ───`,'mute');
  setPinging(p,false);
  const loss = p.state.sent>0 ? ((p.state.sent-p.state.recv)/p.state.sent*100) : 100;
  setStatus(p,'done', loss===0?'DONE ✓':`DONE ${loss.toFixed(0)}% loss`);
}
function onStopped(p,msg) { tLine(p,msg.message,'stop'); setPinging(p,false); setStatus(p,'idle','STOPPED'); }

// ── UI helpers ─────────────────────────────────────────────
function setPinging(p, val) {
  const {els,state}=p;
  state.pinging=val;
  els.bgo.disabled=val; els.bstop.disabled=!val;
  if(val){
    setStatus(p,'pinging','PINGING');
    wsDot.className='ws-dot busy'; wsLabel.textContent='pinging';
    els.title.textContent=els.host.value.trim()||`panel-${state.id}`;
    els.title.classList.add('live');
    addCursor(p);
  } else {
    els.title.classList.remove('live');
    removeCursor(p);
    const anyLive=[...panels.values()].some(q=>q.state.pinging);
    if(!anyLive){ wsDot.className='ws-dot ok'; wsLabel.textContent='connected'; }
  }
}

function setStatus(p,cls,txt){ p.els.status.className=`panel-status ${cls}`; p.els.status.textContent=txt; }

function resetStats(p){
  ['ss','sr','sl','sa','sm'].forEach(k=>{ p.els[k].textContent='—'; p.els[k].className='stat-val'; });
}

function liveStats(p){
  const {state,els}=p;
  els.ss.textContent=state.sent;
  els.sr.textContent=state.recv; els.sr.className='stat-val '+(state.recv>0?'g':'');
  const loss=state.sent>0?((state.sent-state.recv)/state.sent*100).toFixed(0):0;
  els.sl.textContent=loss+'%'; els.sl.className='stat-val '+(loss==0?'g':loss<20?'y':'r');
  if(state.rtts.length){
    const avg=(state.rtts.reduce((a,b)=>a+b,0)/state.rtts.length).toFixed(1);
    const mx=Math.max(...state.rtts).toFixed(1);
    els.sa.textContent=avg+'ms'; els.sa.className='stat-val '+rc(parseFloat(avg));
    els.sm.textContent=mx+'ms';  els.sm.className='stat-val '+rc(parseFloat(mx));
  }
}

function parseStatLn(p,line){
  const t=line.match(/(\d+) packets transmitted/i);
  const r=line.match(/(\d+) (?:packets )?received/i);
  const l=line.match(/([\d.]+)%/);
  if(t) p.els.ss.textContent=t[1];
  if(r){ p.els.sr.textContent=r[1]; p.els.sr.className='stat-val '+(parseInt(r[1])>0?'g':'r'); }
  if(l){ const v=parseFloat(l[1]); p.els.sl.textContent=l[1]+'%'; p.els.sl.className='stat-val '+(v===0?'g':v<20?'y':'r'); }
}

function parseRttLn(p,line){
  const m=line.match(/([\d.]+)\/([\d.]+)\/([\d.]+)/);
  if(m){
    p.els.sa.textContent=m[2]+'ms'; p.els.sa.className='stat-val '+rc(parseFloat(m[2]));
    p.els.sm.textContent=m[3]+'ms'; p.els.sm.className='stat-val '+rc(parseFloat(m[3]));
  }
}

function rc(v){ return v<50?'g':v<150?'y':'r'; }
function xMs(line){ const m=line.match(/time[=<]\s*([\d.]+)\s*ms/i); return m?parseFloat(m[1]):null; }

// ── Terminal ───────────────────────────────────────────────
function clearTerm(p){ p.els.term.innerHTML=''; }

function tLine(p, text, cls){
  removeCursor(p);
  const d=document.createElement('div'); d.className='tl';
  d.innerHTML=`<span class="tp">$</span><span class="tt ${cls}">${escH(text)}</span>`;
  p.els.term.appendChild(d);
  if(p.state.pinging) addCursor(p);
  p.els.term.scrollTop=p.els.term.scrollHeight;
}

function tLineMs(p, text, cls, ms){
  removeCursor(p);
  const mc=ms===null?'x':ms<50?'f':ms<150?'m':'s';
  const msStr=ms!==null?`${ms.toFixed(1)} ms`:'timeout';
  const d=document.createElement('div'); d.className='tl';
  d.innerHTML=`<span class="tp">$</span><span class="tt ${cls}">${escH(text)}</span><span class="tms ${mc}">${msStr}</span>`;
  p.els.term.appendChild(d);
  if(p.state.pinging) addCursor(p);
  p.els.term.scrollTop=p.els.term.scrollHeight;
}

function addCursor(p){
  removeCursor(p);
  const c=document.createElement('div'); c.className='tl t-cur-row';
  c.innerHTML='<span class="t-cursor"></span>';
  p.els.term.appendChild(c);
  p.els.term.scrollTop=p.els.term.scrollHeight;
}
function removeCursor(p){ p.els.term.querySelectorAll('.t-cur-row').forEach(e=>e.remove()); }
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Header actions ─────────────────────────────────────────
document.getElementById('btnAdd').addEventListener('click', () => createPanel());
document.getElementById('btnPingAll').addEventListener('click', () => panels.forEach((_,id)=>startPing(id)));
document.getElementById('btnStopAll').addEventListener('click', () => {
  wsSend({ action:'stopAll' });
  panels.forEach(p=>{
    if(p.state.pinging){ setPinging(p,false); setStatus(p,'idle','STOPPED'); tLine(p,'Stopped by user.','stop'); }
  });
});
document.getElementById('btnClearAll').addEventListener('click', () => {
  panels.forEach(p=>{ clearTerm(p); resetStats(p); });
});

// ── Bootstrap ──────────────────────────────────────────────
createPanel('8.8.8.8');
createPanel('1.1.1.1');
</script>
</body>
</html>
